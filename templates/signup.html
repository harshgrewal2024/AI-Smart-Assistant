<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- 🔥 BIG BACKGROUND TEXT -->
<h1 class="big-text">AI</h1>

<!-- 🔥 LEFT SIDE TEXT (premium feel) -->
<div class="hero-text">
    <h1>AI Smart Assistant</h1>
    <p>Secure access to intelligent system for chat & resume analysis</p>
</div>

<!-- 🔐 LOGIN CARD -->
<div class="card">
    
    <h2>🔐 Secure Sign Up</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Sign Up</button>
    </form>

    <p>Don't have an account?</p>
    <a href="/login">Login</a>
</div>

</body>
</html>
